<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0f172a" />
  
  <!-- Trend / Connection Line -->
  <path d="M 7 23 L 13 17 L 19 20 L 25 10" fill="none" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Glowing AI Nodes -->
  <circle cx="7" cy="23" r="2" fill="#06b6d4" />
  <circle cx="13" cy="17" r="2" fill="#06b6d4" />
  <circle cx="19" cy="20" r="2" fill="#06b6d4" />
  <circle cx="25" cy="10" r="3" fill="#10b981" filter="url(#glow)" />
</svg>
